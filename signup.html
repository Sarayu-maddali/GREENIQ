<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up - GREEN IQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background: url("image.jpg") center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: Arial;
}

.box {
    background: rgba(0,0,0,0.25);
    padding: 80px;
    width: 500px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.8);
}

h2 {
    text-align: center;
    color: rgba(255,255,255,0.9);
    font-size: 40px;
    margin-bottom: 25px;
}

input, button {
    width: 100%;
    height: 46px;
    padding: 0 14px;
    margin-top: 18px;
    background: rgba(0,0,0,0.35);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    font-size: 16px;
    box-sizing: border-box;
}

::placeholder {
    color: rgba(255,255,255,0.75);
}

input:focus {
    outline: none;
    border-color: #22c55e;
}

button {
    background: rgb(37,146,37);
    border: none;
    font-size: 18px;
    cursor: pointer;
    margin-top: 25px;
}

button:hover {
    background: darkgreen;
}

#error {
    color: rgb(255,100,100);
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="box">
    <h2>Create Account</h2>

    <input id="name" type="text" placeholder="Full Name">
    <input id="email" type="email" placeholder="Email">

    <!-- SEARCHABLE COUNTRY -->
    <input list="countries" id="country" placeholder="Select Country">

    <datalist id="countries">
        <option value="Afghanistan"><option value="Albania"><option value="Algeria"><option value="Andorra"><option value="Angola">

        <option value="Austria"><option value="Azerbaijan"><option value="Bahamas"><option value="Bahrain"><option value="Bangladesh">
        <option value="Barbados"><option value="Belarus"><option value="Belgium"><option value="Belize"><option value="Benin">
        <option value="Bhutan"><option value="Bolivia"><option value="Bosnia and Herzegovina"><option value="Botswana"><option value="Brazil">
        <option value="Brunei"><option value="Bulgaria"><option value="Burkina Faso"><option value="Burundi"><option value="Cambodia">
        <option value="Cameroon"><option value="Canada"><option value="Cape Verde"><option value="Central African Republic"><option value="Chad">
        <option value="Chile"><option value="China"><option value="Colombia"><option value="Comoros"><option value="Costa Rica">
        <option value="Croatia"><option value="Cuba"><option value="Cyprus"><option value="Czech Republic"><option value="Denmark">
        <option value="Djibouti"><option value="Dominica"><option value="Dominican Republic"><option value="Ecuador"><option value="Egypt">
        <option value="El Salvador"><option value="Equatorial Guinea"><option value="Eritrea"><option value="Estonia"><option value="Eswatini">
        <option value="Ethiopia"><option value="Fiji"><option value="Finland"><option value="France"><option value="Gabon"><option value="Gambia">
        <option value="Georgia"><option value="Germany"><option value="Ghana"><option value="Greece"><option value="Grenada">
        <option value="Guatemala"><option value="Guinea"><option value="Guyana"><option value="Haiti"><option value="Honduras">
        <option value="Hungary"><option value="Iceland"><option value="India"><option value="Indonesia"><option value="Iran"><option value="Iraq">
        <option value="Ireland"><option value="Israel"><option value="Italy"><option value="Jamaica"><option value="Japan"><option value="Jordan">
        <option value="Kazakhstan"><option value="Kenya"><option value="Kiribati"><option value="Kuwait"><option value="Kyrgyzstan">
        <option value="Laos"><option value="Latvia"><option value="Lebanon"><option value="Lesotho"><option value="Liberia"><option value="Libya">
        <option value="Liechtenstein"><option value="Lithuania"><option value="Luxembourg"><option value="Madagascar"><option value="Malawi">
        <option value="Malaysia"><option value="Maldives"><option value="Mali"><option value="Malta"><option value="Mexico"><option value="Moldova">
        <option value="Monaco"><option value="Mongolia"><option value="Montenegro"><option value="Morocco"><option value="Mozambique">
        <option value="Myanmar"><option value="Namibia"><option value="Nepal"><option value="Netherlands"><option value="New Zealand">
        <option value="Nicaragua"><option value="Niger"><option value="Nigeria"><option value="North Korea"><option value="North Macedonia">
        <option value="Norway"><option value="Oman"><option value="Pakistan"><option value="Panama"><option value="Paraguay"><option value="Peru">
        <option value="Philippines"><option value="Poland"><option value="Portugal"><option value="Qatar"><option value="Romania">
        <option value="Russia"><option value="Rwanda"><option value="Saudi Arabia"><option value="Senegal"><option value="Serbia">
        <option value="Singapore"><option value="Slovakia"><option value="Slovenia"><option value="South Africa"><option value="South Korea">
        <option value="Spain"><option value="Sri Lanka"><option value="Sudan"><option value="Sweden"><option value="Switzerland">
        <option value="Syria"><option value="Taiwan"><option value="Thailand"><option value="Tunisia"><option value="Turkey"><option value="Uganda">
        <option value="Ukraine"><option value="United Arab Emirates"><option value="United Kingdom"><option value="United States">
        <option value="Uruguay"><option value="Uzbekistan"><option value="Venezuela"><option value="Vietnam"><option value="Yemen">
        <option value="Zambia"><option value="Zimbabwe">
    </datalist>

    <input id="pass" type="password" placeholder="Password">
    <div id="error"></div>
    <button onclick="signup()">Sign Up</button>
</div>

<script>
const API_BASE = "http://localhost:4000";

async function signup() {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const country = document.getElementById("country").value.trim();
    const password = document.getElementById("pass").value.trim();
    const error = document.getElementById("error");

    error.textContent = "";

    if (!name || !email || !password) {
        error.textContent = "All fields are required";
        return;
    }

    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {
        error.textContent = "Invalid email format";
        return;
    }

    if (password.length < 6) {
        error.textContent = "Password must be at least 6 characters";
        return;
    }

    try {
        const res = await fetch(`${API_BASE}/api/auth/signup`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, password, country })
        });

        const data = await res.json();
        if (!res.ok) {
            error.textContent = data.message || "Signup failed";
            return;
        }

        localStorage.setItem("token", data.token);
        localStorage.setItem("playerName", data.user.name);
        localStorage.removeItem("streak");
        localStorage.removeItem("lastDate");
        localStorage.removeItem("quizDone");
        location.href = "quiz.html";
    } catch {
        error.textContent = "Network error";
    }
}
</script>

</body>
</html>
